<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SCOUTER - FRIEZA FORCE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#0a0a0a;font-family:'Courier New',monospace;color:#00ff88;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:420px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:16px}

.scouter-frame{
  width:340px;height:220px;
  border:3px solid #00ff88;border-radius:4px 64px 4px 4px;
  background:#001a0d;position:relative;overflow:hidden;
}
.scouter-frame::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(0,255,136,0.03) 18px,rgba(0,255,136,0.03) 19px);
  pointer-events:none;z-index:1;
}
.corner{position:absolute;width:10px;height:10px}
.c-tl{top:5px;left:5px;border-top:2px solid #00ff88;border-left:2px solid #00ff88}
.c-tr{top:5px;right:138px;border-top:2px solid #00ff88;border-right:2px solid #00ff88}
.c-bl{bottom:5px;left:5px;border-bottom:2px solid #00ff88;border-left:2px solid #00ff88}
.c-br{bottom:5px;right:138px;border-bottom:2px solid #00ff88;border-right:2px solid #00ff88}
.sig{position:absolute;top:8px;right:10px;width:6px;height:6px;border-radius:50%;background:#00ff88;animation:blink 1.2s infinite;z-index:2}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

.info-panel{position:absolute;left:12px;top:12px;display:flex;flex-direction:column;gap:7px;z-index:2}
.irow{display:flex;align-items:center;gap:5px;font-size:10px}
.ilbl{color:rgba(0,255,136,.45);width:48px}
.ibar{height:5px;background:rgba(0,255,136,.12);border:1px solid rgba(0,255,136,.25);width:76px;border-radius:1px;overflow:hidden}
.ibfill{height:100%;background:#00ff88;width:0%;transition:width 1.4s ease;border-radius:1px}
.ival{font-size:9px;color:#00ff88;min-width:24px}

.power-area{position:absolute;bottom:12px;left:12px;z-index:2}
.plbl{font-size:8px;color:rgba(0,255,136,.45);letter-spacing:2px;margin-bottom:2px}
.pnum{font-size:30px;font-weight:bold;color:#00ff88;letter-spacing:4px;min-width:130px}
.pnum.counting{animation:flicker .08s infinite}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:.5}}

.lens-wrap{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  width:120px;height:120px;border-radius:50%;
  border:3px solid #00ff88;overflow:hidden;
  background:#000;display:flex;align-items:center;justify-content:center;z-index:2;
}
#camVideo{width:100%;height:100%;object-fit:cover;border-radius:50%;display:none}
.lens-placeholder{font-size:28px;color:rgba(0,255,136,.3);text-align:center;line-height:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.lens-sweep{
  position:absolute;inset:0;border-radius:50%;
  border-top:2px solid #00ff88;opacity:0;pointer-events:none;
}
.lens-sweep.on{animation:sweep .5s linear infinite;opacity:1}
@keyframes sweep{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.lens-overlay{
  position:absolute;inset:0;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:bold;color:#00ff88;
  opacity:0;transition:opacity .3s;pointer-events:none;
  text-align:center;line-height:1.4;
  text-shadow:0 0 8px #00ff88;
}
.lens-overlay.show{opacity:1}

.crosshair{position:absolute;inset:0;border-radius:50%;pointer-events:none;opacity:0;transition:opacity .3s}
.crosshair.show{opacity:1}
.ch-h{position:absolute;top:50%;left:10%;right:10%;height:1px;background:rgba(0,255,136,.5);transform:translateY(-50%)}
.ch-v{position:absolute;left:50%;top:10%;bottom:10%;width:1px;background:rgba(0,255,136,.5);transform:translateX(-50%)}
.ch-c{position:absolute;top:50%;left:50%;width:12px;height:12px;border:1px solid #00ff88;transform:translate(-50%,-50%)}

.face-ring{
  position:absolute;inset:8px;border-radius:50%;
  border:2px solid #ffff00;opacity:0;transition:opacity .3s;pointer-events:none;
}
.face-ring.show{opacity:1;animation:ring-pulse .8s ease-in-out infinite}
@keyframes ring-pulse{0%,100%{border-color:#ffff00}50%{border-color:#00ff88}}

.btns{display:flex;gap:10px;width:340px}
.btn{
  flex:1;padding:14px 8px;
  background:transparent;border:2px solid #00ff88;color:#00ff88;
  font-size:12px;font-family:'Courier New',monospace;letter-spacing:2px;
  cursor:pointer;border-radius:2px;transition:background .15s;
}
.btn:hover{background:rgba(0,255,136,.08)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn.danger{border-color:#ff4444;color:#ff4444}
.btn.danger:hover{background:rgba(255,68,68,.08)}

.statusbar{width:340px;display:flex;justify-content:space-between;font-size:9px;color:rgba(0,255,136,.4);letter-spacing:1px}

.quote-box{
  width:340px;min-height:64px;
  border:1px solid rgba(0,255,136,.2);background:#001a0d;
  padding:14px 16px;font-size:14px;line-height:1.8;
  color:#00ff88;border-radius:2px;font-style:italic;
  opacity:0;transition:opacity .5s;
}
.quote-box.show{opacity:1}
.qspk{font-size:10px;color:rgba(0,255,136,.45);margin-top:6px;font-style:normal;letter-spacing:1px}

.hint{width:340px;font-size:10px;color:rgba(0,255,136,.35);text-align:center;letter-spacing:1px;line-height:1.8}
</style>
</head>
<body>
<div class="wrap">

  <div class="scouter-frame">
    <div class="corner c-tl"></div><div class="corner c-tr"></div>
    <div class="corner c-bl"></div><div class="corner c-br"></div>
    <div class="sig"></div>

    <div class="info-panel">
      <div class="irow"><span class="ilbl">POWER</span><div class="ibar"><div class="ibfill" id="bp"></div></div><span class="ival" id="vp">--</span></div>
      <div class="irow"><span class="ilbl">SPEED</span><div class="ibar"><div class="ibfill" id="bs"></div></div><span class="ival" id="vs">--</span></div>
      <div class="irow"><span class="ilbl">KI LVL</span><div class="ibar"><div class="ibfill" id="bk"></div></div><span class="ival" id="vk">--</span></div>
    </div>

    <div class="power-area">
      <div class="plbl">BATTLE POWER</div>
      <div class="pnum" id="pnum">------</div>
    </div>

    <div class="lens-wrap">
      <video id="camVideo" autoplay playsinline muted></video>
      <div class="lens-placeholder" id="lensPlaceholder">
        <div style="font-size:36px;opacity:.25">◎</div>
        <div style="font-size:9px;margin-top:6px;letter-spacing:1px">NO FEED</div>
      </div>
      <div class="face-ring" id="faceRing"></div>
      <div class="crosshair" id="crosshair">
        <div class="ch-h"></div><div class="ch-v"></div><div class="ch-c"></div>
      </div>
      <div class="lens-sweep" id="sweep"></div>
      <div class="lens-overlay" id="lensOv"></div>
    </div>
  </div>

  <div class="statusbar">
    <span>SCOUTER v3.2 / FRIEZA FORCE</span>
    <span id="stR">STANDBY</span>
  </div>

  <div class="btns">
    <button class="btn" id="btnCam" onclick="toggleCamera()">[ CAMERA ON ]</button>
    <button class="btn" id="btnScan" onclick="startScan()" disabled>[ SCAN ]</button>
  </div>

  <div class="quote-box" id="qbox">
    <div id="qtxt"></div>
    <div class="qspk" id="qspk"></div>
  </div>

  <div class="hint">
    カメラをONにして顔を向けると自動スキャン開始<br>
    または [ SCAN ] ボタンで手動スキャン
  </div>

</div>

<script>
'use strict';

const DATA = [
  {power:5,     pct:1,  sp:2,  ki:1,  q:"戦闘力…たったの5か。　ゴミめ。",                       s:"— フリーザ"},
  {power:9000,  pct:90, sp:88, ki:85, q:"なんだと…！戦闘力9000を超えているだと！？　バカな！！",   s:"— ベジータ"},
  {power:530,   pct:12, sp:20, ki:10, q:"530か。　地球人にしてはまあまあだな。",                   s:"— ラディッツ"},
  {power:8000,  pct:82, sp:79, ki:80, q:"8000！？　こいつ…まだ本気を出していなかったのか！",       s:"— ギニュー"},
  {power:1,     pct:0,  sp:1,  ki:0,  q:"戦闘力…1だと？　測定誤差か？　いや…これが現実だ。",       s:"— ザーボン"},
  {power:18000, pct:99, sp:95, ki:99, q:"18000！？　ス…スカウターが壊れた！？",                   s:"— ベジータ"},
  {power:206,   pct:5,  sp:8,  ki:4,  q:"206か。　雑魚め。　相手にもならん。",                     s:"— ドドリア"},
  {power:3,     pct:1,  sp:1,  ki:1,  q:"戦闘力3。　農民か何かか？",                              s:"— フリーザ軍兵士"},
  {power:120,   pct:3,  sp:5,  ki:2,  q:"120か…。　まあ、生かしておいてやろう。",                  s:"— フリーザ"},
  {power:42000, pct:99, sp:99, ki:99, q:"42000！？！？　き…貴様、何者だ！！",                      s:"— ギニュー隊長"},
];

let camOn=false, scanning=false, stream=null;
let detectTimer=null, faceTimer=null;
let faceDetected=false, idx=0;

const canvas2 = document.createElement('canvas');
const ctx2    = canvas2.getContext('2d');
canvas2.width = 40; canvas2.height = 40;
let prevBright = null;

// ── カメラ ON/OFF ──
async function toggleCamera(){
  if(camOn){ stopCamera(); return; }
  const btn = document.getElementById('btnCam');
  btn.textContent = '[ CONNECTING... ]'; btn.disabled = true;
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'user', width:{ideal:640}, height:{ideal:480} }, audio:false
    });
    const v = document.getElementById('camVideo');
    v.srcObject = stream;
    await v.play();
    v.style.display = 'block';
    document.getElementById('lensPlaceholder').style.display = 'none';
    camOn = true;
    btn.textContent = '[ CAMERA OFF ]'; btn.disabled = false; btn.className = 'btn danger';
    document.getElementById('btnScan').disabled = false;
    document.getElementById('stR').textContent = 'CAMERA ACTIVE';
    startFaceDetect();
  }catch(e){
    btn.textContent = '[ CAMERA ON ]'; btn.disabled = false;
    document.getElementById('stR').textContent = 'ACCESS DENIED';
    showQuote({q:"カメラへのアクセスが拒否されました。\nブラウザの設定でカメラを許可してください。", s:"— スカウター"});
  }
}

function stopCamera(){
  if(stream) stream.getTracks().forEach(t=>t.stop());
  stream=null; camOn=false; faceDetected=false; prevBright=null;
  clearTimeout(faceTimer); clearTimeout(detectTimer);
  document.getElementById('camVideo').style.display = 'none';
  document.getElementById('lensPlaceholder').style.display = 'flex';
  document.getElementById('btnCam').textContent = '[ CAMERA ON ]';
  document.getElementById('btnCam').className = 'btn';
  document.getElementById('btnScan').disabled = true;
  document.getElementById('faceRing').classList.remove('show');
  document.getElementById('crosshair').classList.remove('show');
  document.getElementById('stR').textContent = 'STANDBY';
}

// ── 擬似ターゲット検出（映像の明るさでカメラに何か映っているか判定）──
function startFaceDetect(){
  function detect(){
    if(!camOn) return;
    const v = document.getElementById('camVideo');
    if(v.readyState >= 2 && v.videoWidth > 0){
      ctx2.drawImage(v, 0, 0, 40, 40);
      const d = ctx2.getImageData(0, 0, 40, 40).data;
      let sum = 0;
      for(let i=0; i<d.length; i+=4) sum += (d[i]+d[i+1]+d[i+2])/3;
      const bright = sum / (d.length/4);

      if(prevBright !== null){
        if(bright > 15){
          if(!faceDetected){
            faceDetected = true;
            document.getElementById('faceRing').classList.add('show');
            document.getElementById('crosshair').classList.add('show');
            document.getElementById('stR').textContent = 'TARGET LOCKED';
            // 2.5秒後に自動スキャン
            faceTimer = setTimeout(()=>{
              if(camOn && !scanning) startScan();
            }, 2500);
          }
        } else {
          if(faceDetected){
            faceDetected = false;
            clearTimeout(faceTimer);
            document.getElementById('faceRing').classList.remove('show');
            document.getElementById('crosshair').classList.remove('show');
            document.getElementById('stR').textContent = 'SEARCHING...';
          }
        }
      }
      prevBright = bright;
    }
    detectTimer = setTimeout(detect, 400);
  }
  detect();
}

// ── スキャン ──
function startScan(){
  if(scanning) return;
  scanning = true;
  clearTimeout(faceTimer);
  document.getElementById('btnScan').disabled = true;
  document.getElementById('stR').textContent = 'ANALYZING...';
  document.getElementById('qbox').classList.remove('show');
  document.getElementById('sweep').classList.add('on');
  document.getElementById('lensOv').classList.remove('show');
  document.getElementById('lensOv').textContent = '';
  document.getElementById('pnum').className = 'pnum counting';
  document.getElementById('pnum').textContent = '------';
  ['bp','bs','bk'].forEach(id=>document.getElementById(id).style.width='0%');
  ['vp','vs','vk'].forEach(id=>document.getElementById(id).textContent='--');

  const d = DATA[idx % DATA.length]; idx++;
  let elapsed = 0;
  const tick = setInterval(()=>{
    document.getElementById('pnum').textContent = String(Math.floor(Math.random()*99999)).padStart(6,'0');
    elapsed += 100;
    if(elapsed >= 2000){ clearInterval(tick); showResult(d); }
  }, 100);
}

function showResult(d){
  document.getElementById('sweep').classList.remove('on');
  document.getElementById('pnum').className = 'pnum';

  let n = 0;
  const target = d.power;
  const step = Math.max(1, Math.floor(target/40));
  const counter = setInterval(()=>{
    n = Math.min(n + step, target);
    document.getElementById('pnum').textContent = String(n).padStart(6,'0');
    if(n >= target){
      clearInterval(counter);
      document.getElementById('pnum').textContent = String(target).padStart(6,'0');
      const ov = document.getElementById('lensOv');
      ov.textContent = target.toLocaleString();
      ov.classList.add('show');
      setTimeout(()=>{
        document.getElementById('bp').style.width = d.pct+'%'; document.getElementById('vp').textContent = d.pct;
        document.getElementById('bs').style.width = d.sp+'%';  document.getElementById('vs').textContent = d.sp;
        document.getElementById('bk').style.width = d.ki+'%';  document.getElementById('vk').textContent = d.ki;
      }, 200);
      setTimeout(()=>{
        showQuote(d);
        document.getElementById('stR').textContent = 'COMPLETE';
        document.getElementById('btnScan').disabled = false;
        scanning = false;
        // 4秒後に再び自動スキャンループ
        if(camOn){
          faceTimer = setTimeout(()=>{
            if(camOn && !scanning && faceDetected) startScan();
          }, 4000);
        }
      }, 700);
    }
  }, 30);
}

function showQuote(d){
  document.getElementById('qtxt').textContent = d.q;
  document.getElementById('qspk').textContent = d.s;
  document.getElementById('qbox').classList.add('show');
}
</script>
</body>
</html>
