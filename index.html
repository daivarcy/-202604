<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SCOUTER - FRIEZA FORCE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  background:#0a0a0a;
  font-family:'Courier New',monospace;
  color:#00ff88;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
}
.wrap{
  width:100%;max-width:480px;
  padding:24px 16px;
  display:flex;flex-direction:column;align-items:center;
  gap:20px;
}

/* ══════════════════════════════
   スカウター本体（ヘッドセット型）
══════════════════════════════ */
.scouter-unit{
  width:440px;height:480px;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}

/* バンド（頭に巻く部分）*/
.band{
  position:absolute;
  left:0;right:0;top:50%;transform:translateY(-50%);
  height:22px;
  background:#111;
  border-top:2px solid #333;
  border-bottom:2px solid #333;
}
.band-left{
  position:absolute;
  left:0;top:50%;transform:translateY(-50%);
  width:80px;height:22px;
  background:linear-gradient(90deg,#0a0a0a,#111);
  border-top:2px solid #2a2a2a;
  border-bottom:2px solid #2a2a2a;
}
.band-right{
  position:absolute;
  right:0;top:50%;transform:translateY(-50%);
  width:80px;height:22px;
  background:linear-gradient(270deg,#0a0a0a,#111);
  border-top:2px solid #2a2a2a;
  border-bottom:2px solid #2a2a2a;
}

/* アーム（バンドからレンズへの接続部）*/
.arm{
  position:absolute;
  right:370px;top:50%;
  width:60px;height:18px;
  background:#1a1a1a;
  border:2px solid #333;
  transform:translateY(-50%);
  z-index:3;
}
.arm::before{
  content:'';
  position:absolute;right:-2px;top:50%;transform:translateY(-50%);
  width:8px;height:8px;border-radius:50%;
  background:#222;border:2px solid #444;
}

/* レンズ本体（片目バイザー）*/
.lens-body{
  position:absolute;
  right:8px;top:50%;transform:translateY(-50%);
  width:380px;height:380px;
  background:#001a0d;
  border:3px solid #00cc66;
  border-radius:16px 60px 16px 16px;
  overflow:hidden;
  z-index:4;
  box-shadow:
    0 0 32px rgba(0,255,136,0.4),
    inset 0 0 50px rgba(0,255,136,0.05);
}

/* スキャンライン */
.lens-body::before{
  content:'';
  position:absolute;inset:0;
  background:repeating-linear-gradient(
    0deg,transparent,transparent 8px,
    rgba(0,255,136,0.04) 8px,rgba(0,255,136,0.04) 9px
  );
  pointer-events:none;z-index:1;
}

/* レンズのグリーン反射効果 */
.lens-tint{
  position:absolute;inset:0;
  background:rgba(0,255,136,0.06);
  pointer-events:none;z-index:0;
}

/* カメラ映像 */
#camVideo{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  display:none;
  filter:hue-rotate(90deg) saturate(0.8) brightness(0.8);
  mix-blend-mode:screen;
  z-index:2;
}
#camVideoOverlay{
  position:absolute;inset:0;
  background:rgba(0,30,15,0.5);
  z-index:3;pointer-events:none;
  display:none;
}

/* NO FEED表示 */
.no-feed{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;z-index:2;
}
.no-feed-circle{
  width:80px;height:80px;border-radius:50%;
  border:2px solid rgba(0,255,136,0.2);
  display:flex;align-items:center;justify-content:center;
  color:rgba(0,255,136,0.2);font-size:40px;
}
.no-feed-txt{font-size:14px;color:rgba(0,255,136,0.3);letter-spacing:2px}

/* スキャン回転 */
.sweep{
  position:absolute;
  /* 円形スキャンリング */
  left:50%;top:50%;
  width:0;height:0;
  opacity:0;z-index:5;pointer-events:none;
}
.sweep.on{animation:scanRing 1.2s ease-out infinite;opacity:1}
@keyframes scanRing{
  0%  {width:0;height:0;margin-left:0;margin-top:0;
       border:3px solid rgba(0,255,136,0.9);border-radius:50%}
  80% {width:360px;height:360px;margin-left:-180px;margin-top:-180px;
       border:3px solid rgba(0,255,136,0.1);border-radius:50%}
  100%{width:380px;height:380px;margin-left:-190px;margin-top:-190px;
       border:2px solid rgba(0,255,136,0);border-radius:50%}
}

/* ターゲット十字線 */
.crosshair{
  position:absolute;inset:0;
  opacity:0;transition:opacity .3s;z-index:5;pointer-events:none;
}
.crosshair.show{opacity:1}
.ch-h{position:absolute;top:50%;left:8%;right:8%;height:1px;background:rgba(0,255,136,0.6);transform:translateY(-50%)}
.ch-v{position:absolute;left:50%;top:8%;bottom:8%;width:1px;background:rgba(0,255,136,0.6);transform:translateX(-50%)}
.ch-box{position:absolute;top:50%;left:50%;width:24px;height:24px;border:1px solid #00ff88;transform:translate(-50%,-50%)}

/* ターゲットリング */
.target-ring{
  position:absolute;inset:12px;
  border-radius:4px;
  border:2px solid #ffff00;
  opacity:0;transition:opacity .3s;z-index:5;pointer-events:none;
}
.target-ring.show{opacity:1;animation:tring .8s ease-in-out infinite}
@keyframes tring{0%,100%{border-color:#ffff00}50%{border-color:#00ff88}}

/* HUDオーバーレイ（数値表示）*/
.hud{
  position:absolute;inset:0;z-index:6;pointer-events:none;
  padding:6px;
}
.hud-top{display:flex;justify-content:space-between;align-items:flex-start}
.hud-badge{
  font-size:14px;color:rgba(0,255,136,0.6);
  background:rgba(0,0,0,0.5);
  padding:2px 4px;letter-spacing:1px;
}
.hud-sig{width:5px;height:5px;border-radius:50%;background:#00ff88;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}
.hud-power{
  position:absolute;bottom:10px;left:10px;right:10px;
  font-size:16px;color:rgba(0,255,136,0.7);
  display:flex;justify-content:space-between;align-items:flex-end;
}
.hud-pnum{
  font-size:44px;font-weight:bold;color:#00ff88;
  letter-spacing:2px;line-height:1;
  text-shadow:0 0 10px rgba(0,255,136,0.5);
}
.hud-pnum.counting{animation:flicker .08s infinite}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:.4}}

/* レンズ右上の小さなインジケーター */
.lens-ind{
  position:absolute;top:6px;right:6px;
  display:flex;gap:3px;z-index:7;
}
.ind-dot{width:4px;height:4px;border-radius:50%;background:rgba(0,255,136,0.3)}
.ind-dot.active{background:#00ff88}

/* ステータスバー */
.info-row{
  width:440px;
  display:flex;gap:8px;align-items:center;
}
.info-seg{
  flex:1;height:34px;
  background:#001a0d;border:1px solid rgba(0,255,136,0.25);
  display:flex;align-items:center;gap:5px;padding:0 6px;
  font-size:9px;
}
.seg-lbl{color:rgba(0,255,136,0.4);letter-spacing:1px;min-width:40px;font-size:14px}
.seg-bar{flex:1;height:6px;background:rgba(0,255,136,0.1);border-radius:1px;overflow:hidden}
.seg-fill{height:100%;background:#00ff88;width:0%;transition:width 1.4s ease}
.seg-val{color:#00ff88;font-size:14px;min-width:28px;text-align:right}

/* ボタン */
.btns{display:flex;gap:10px;width:440px}
.btn{
  flex:1;padding:13px 8px;
  background:transparent;
  border:2px solid #00ff88;
  color:#00ff88;font-size:16px;
  font-family:'Courier New',monospace;letter-spacing:2px;
  cursor:pointer;border-radius:2px;
  transition:background .15s;
}
.btn:hover{background:rgba(0,255,136,.08)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn.danger{border-color:#ff4444;color:#ff4444}
.btn.danger:hover{background:rgba(255,68,68,.08)}

/* ステータスライン */
.statusline{
  width:440px;
  display:flex;justify-content:space-between;
  font-size:13px;color:rgba(0,255,136,0.35);letter-spacing:1px;
}

/* セリフ */
.quote-box{
  width:440px;
  border:1px solid rgba(0,255,136,.2);
  background:#001a0d;
  padding:14px 16px;
  font-size:30px;line-height:1.9;
  color:#00ff88;border-radius:2px;
  font-style:italic;
  opacity:0;transition:opacity .6s;
}
.quote-box.show{opacity:1}
.qspk{font-size:22px;color:rgba(0,255,136,.4);margin-top:6px;font-style:normal;letter-spacing:1px}

.hint{
  font-size:14px;color:rgba(0,255,136,.3);
  text-align:center;letter-spacing:1px;line-height:1.9;
}
</style>
</head>
<body>
<div class="wrap">

  <!-- スカウター本体 -->
  <div class="scouter-unit">
    <!-- バンド -->
    <div class="band"></div>
    <div class="band-left"></div>
    <div class="band-right"></div>
    <!-- アーム -->
    <div class="arm"></div>
    <!-- レンズ -->
    <div class="lens-body">
      <div class="lens-tint"></div>
      <!-- カメラ映像 -->
      <video id="camVideo" autoplay playsinline muted></video>
      <div id="camVideoOverlay"></div>
      <!-- NO FEED -->
      <div class="no-feed" id="noFeed">
        <div class="no-feed-circle">◎</div>
        <div class="no-feed-txt">NO FEED</div>
      </div>
      <!-- 各種オーバーレイ -->
      <div class="target-ring" id="targetRing"></div>
      <div class="crosshair" id="crosshair">
        <div class="ch-h"></div><div class="ch-v"></div><div class="ch-box"></div>
      </div>
      <div class="sweep" id="sweep"></div>
      <!-- HUD -->
      <div class="hud">
        <div class="hud-top">
          <div class="hud-badge" id="hudBadge">STANDBY</div>
          <div class="hud-sig"></div>
        </div>
        <div class="hud-power">
          <div style="font-size:7px;color:rgba(0,255,136,0.4);letter-spacing:1px">BATTLE POWER</div>
          <div class="hud-pnum" id="pnum">------</div>
        </div>
      </div>
      <!-- インジケーター -->
      <div class="lens-ind">
        <div class="ind-dot active" id="ind0"></div>
        <div class="ind-dot" id="ind1"></div>
        <div class="ind-dot" id="ind2"></div>
      </div>
    </div>
  </div>

  <!-- ステータスバー -->
  <div class="info-row">
    <div class="info-seg"><span class="seg-lbl">PWR</span><div class="seg-bar"><div class="seg-fill" id="bp"></div></div><span class="seg-val" id="vp">--</span></div>
    <div class="info-seg"><span class="seg-lbl">SPD</span><div class="seg-bar"><div class="seg-fill" id="bs"></div></div><span class="seg-val" id="vs">--</span></div>
    <div class="info-seg"><span class="seg-lbl">KI</span><div class="seg-bar"><div class="seg-fill" id="bk"></div></div><span class="seg-val" id="vk">--</span></div>
  </div>

  <!-- ステータスライン -->
  <div class="statusline">
    <span>SCOUTER v3.2 / FRIEZA FORCE</span>
    <span id="stR">STANDBY</span>
  </div>

  <!-- ボタン -->
  <div class="btns">
    <button class="btn" id="btnCam" onclick="toggleCamera()">[ CAMERA ON ]</button>
    <button class="btn" id="btnScan" onclick="startScan()" disabled>[ SCAN ]</button>
  </div>

  <!-- セリフ -->
  <div class="quote-box" id="qbox">
    <div id="qtxt"></div>
    <div class="qspk" id="qspk"></div>
  </div>

  <div class="hint">
    カメラをONにして顔を向けると自動スキャン開始<br>
    または [ SCAN ] ボタンで手動スキャン
  </div>

</div>

<script>
'use strict';

const DATA = [
  {power:5,     pct:1,  sp:2,  ki:1,  q:"戦闘力…たったの5か。　ゴミめ。",                       s:"— フリーザ"},
  {power:9000,  pct:90, sp:88, ki:85, q:"なんだと…！戦闘力9000を超えているだと！？　バカな！！",   s:"— ベジータ"},
  {power:530,   pct:12, sp:20, ki:10, q:"530か。　地球人にしてはまあまあだな。",                   s:"— ラディッツ"},
  {power:8000,  pct:82, sp:79, ki:80, q:"8000！？　こいつ…まだ本気を出していなかったのか！",       s:"— ギニュー"},
  {power:1,     pct:0,  sp:1,  ki:0,  q:"戦闘力…1だと？　測定誤差か？　いや…これが現実だ。",       s:"— ザーボン"},
  {power:18000, pct:99, sp:95, ki:99, q:"18000！？　ス…スカウターが壊れた！？",                   s:"— ベジータ"},
  {power:206,   pct:5,  sp:8,  ki:4,  q:"206か。　雑魚め。　相手にもならん。",                     s:"— ドドリア"},
  {power:3,     pct:1,  sp:1,  ki:1,  q:"戦闘力3。　農民か何かか？",                              s:"— フリーザ軍兵士"},
  {power:120,   pct:3,  sp:5,  ki:2,  q:"120か…。　まあ、生かしておいてやろう。",                  s:"— フリーザ"},
  {power:42000, pct:99, sp:99, ki:99, q:"42000！？！？　き…貴様、何者だ！！",                      s:"— ギニュー隊長"},
];

let camOn=false, scanning=false, stream=null;
let detectTimer=null, faceTimer=null;
let faceDetected=false, idx=0;
let indTimer=null, indState=0;

const canvas2=document.createElement('canvas');
const ctx2=canvas2.getContext('2d');
canvas2.width=40; canvas2.height=40;
let prevBright=null;

// インジケーター点滅
function startInd(){
  indTimer=setInterval(()=>{
    for(let i=0;i<3;i++) document.getElementById('ind'+i).className='ind-dot'+(i===indState%3?' active':'');
    indState++;
  },600);
}
function stopInd(){
  clearInterval(indTimer);
  for(let i=0;i<3;i++) document.getElementById('ind'+i).className='ind-dot'+(i===0?' active':'');
}

// カメラON/OFF
async function toggleCamera(){
  if(camOn){stopCamera();return;}
  const btn=document.getElementById('btnCam');
  btn.textContent='[ CONNECTING... ]'; btn.disabled=true;
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false
    });
    const v=document.getElementById('camVideo');
    v.srcObject=stream;
    await v.play();
    v.style.display='block';
    document.getElementById('camVideoOverlay').style.display='block';
    document.getElementById('noFeed').style.display='none';
    camOn=true;
    btn.textContent='[ CAMERA OFF ]'; btn.disabled=false; btn.className='btn danger';
    document.getElementById('btnScan').disabled=false;
    document.getElementById('stR').textContent='CAMERA ACTIVE';
    document.getElementById('hudBadge').textContent='SEARCHING';
    startInd();
    startFaceDetect();
  }catch(e){
    btn.textContent='[ CAMERA ON ]'; btn.disabled=false;
    document.getElementById('stR').textContent='ACCESS DENIED';
    document.getElementById('hudBadge').textContent='ERROR';
    showQuote({q:"カメラへのアクセスが拒否されました。\nブラウザの設定でカメラを許可してください。",s:"— スカウター"});
  }
}

function stopCamera(){
  if(stream) stream.getTracks().forEach(t=>t.stop());
  stream=null; camOn=false; faceDetected=false; prevBright=null;
  clearTimeout(faceTimer); clearTimeout(detectTimer); stopInd();
  document.getElementById('camVideo').style.display='none';
  document.getElementById('camVideoOverlay').style.display='none';
  document.getElementById('noFeed').style.display='flex';
  document.getElementById('btnCam').textContent='[ CAMERA ON ]';
  document.getElementById('btnCam').className='btn';
  document.getElementById('btnScan').disabled=true;
  document.getElementById('targetRing').classList.remove('show');
  document.getElementById('crosshair').classList.remove('show');
  document.getElementById('stR').textContent='STANDBY';
  document.getElementById('hudBadge').textContent='STANDBY';
}

// 擬似ターゲット検出
function startFaceDetect(){
  function detect(){
    if(!camOn) return;
    const v=document.getElementById('camVideo');
    if(v.readyState>=2&&v.videoWidth>0){
      ctx2.drawImage(v,0,0,40,40);
      const d=ctx2.getImageData(0,0,40,40).data;
      let sum=0;
      for(let i=0;i<d.length;i+=4) sum+=(d[i]+d[i+1]+d[i+2])/3;
      const bright=sum/(d.length/4);
      if(prevBright!==null){
        if(bright>15){
          if(!faceDetected){
            faceDetected=true;
            document.getElementById('targetRing').classList.add('show');
            document.getElementById('crosshair').classList.add('show');
            document.getElementById('stR').textContent='TARGET LOCKED';
            document.getElementById('hudBadge').textContent='LOCKED';
            faceTimer=setTimeout(()=>{if(camOn&&!scanning)startScan();},2500);
          }
        } else {
          if(faceDetected){
            faceDetected=false;
            clearTimeout(faceTimer);
            document.getElementById('targetRing').classList.remove('show');
            document.getElementById('crosshair').classList.remove('show');
            document.getElementById('stR').textContent='SEARCHING...';
            document.getElementById('hudBadge').textContent='SEARCHING';
          }
        }
      }
      prevBright=bright;
    }
    detectTimer=setTimeout(detect,400);
  }
  detect();
}

// スキャン
function startScan(){
  if(scanning) return;
  scanning=true;
  clearTimeout(faceTimer);
  document.getElementById('btnScan').disabled=true;
  document.getElementById('stR').textContent='ANALYZING...';
  document.getElementById('hudBadge').textContent='SCAN';
  document.getElementById('qbox').classList.remove('show');
  document.getElementById('sweep').classList.add('on');
  document.getElementById('pnum').className='hud-pnum counting';
  document.getElementById('pnum').textContent='------';
  ['bp','bs','bk'].forEach(id=>document.getElementById(id).style.width='0%');
  ['vp','vs','vk'].forEach(id=>document.getElementById(id).textContent='--');

  const d=DATA[idx%DATA.length]; idx++;
  let elapsed=0;
  const tick=setInterval(()=>{
    document.getElementById('pnum').textContent=String(Math.floor(Math.random()*99999)).padStart(6,'0');
    elapsed+=100;
    if(elapsed>=2000){clearInterval(tick);showResult(d);}
  },100);
}

function showResult(d){
  document.getElementById('sweep').classList.remove('on');
  document.getElementById('pnum').className='hud-pnum';
  let n=0;
  const target=d.power;
  const step=Math.max(1,Math.floor(target/40));
  const counter=setInterval(()=>{
    n=Math.min(n+step,target);
    document.getElementById('pnum').textContent=String(n).padStart(6,'0');
    if(n>=target){
      clearInterval(counter);
      document.getElementById('pnum').textContent=String(target).padStart(6,'0');
      setTimeout(()=>{
        document.getElementById('bp').style.width=d.pct+'%'; document.getElementById('vp').textContent=d.pct;
        document.getElementById('bs').style.width=d.sp+'%';  document.getElementById('vs').textContent=d.sp;
        document.getElementById('bk').style.width=d.ki+'%';  document.getElementById('vk').textContent=d.ki;
      },200);
      setTimeout(()=>{
        showQuote(d);
        document.getElementById('stR').textContent='COMPLETE';
        document.getElementById('hudBadge').textContent='DONE';
        document.getElementById('btnScan').disabled=false;
        scanning=false;
        if(camOn){
          faceTimer=setTimeout(()=>{if(camOn&&!scanning&&faceDetected)startScan();},4000);
        }
      },700);
    }
  },30);
}

function showQuote(d){
  document.getElementById('qtxt').textContent=d.q;
  document.getElementById('qspk').textContent=d.s;
  document.getElementById('qbox').classList.add('show');
}
</script>
</body>
</html>
